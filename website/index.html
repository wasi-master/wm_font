<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WM Font Showcase - A Handwriting Typeface</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">WM Font</div>
        <div class="nav-actions">
            <button class="btn-outline">Download</button>
        </div>
    </nav>
    
    <main class="hero-container">
        <div class="hero-text">
            <div class="subtitle">Customized Typeface by Wasi Master</div>
            <h1>Introducing the all-new <span class="highlight">WM Font</span></h1>
            <p class="description">Fully hand-drawn typeface perfect for text that mimics handwriting.</p>
            <div class="button-group">
                <button class="btn-primary">Try the Playground</button>
                <button class="btn-outline">Get the Font</button>
            </div>
        </div>
        <div class="hero-card">
            <div class="card-header">
                <span class="card-label">PLAYGROUND</span>
                <span class="card-action" id="reset-btn">Reset Text</span>
            </div>
            <div class="editable-text" contenteditable="true">Edit this text to see the font in action!</div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
